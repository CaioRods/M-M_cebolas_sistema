<header class="top-bar">
    <div>
        <h2 class="page-title"><i class="fas fa-id-badge" style="color: var(--primary); margin-right: 10px;"></i>Meu Perfil</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Confira e atualize suas informações pessoais no sistema.</p>
    </div>
</header>

<div style="display: grid; grid-template-columns: 1.2fr 2fr; gap: 24px; align-items: start; margin-top: 20px;" id="profile-layout-grid">
    
    <!-- Painel de Dados do Perfil (Com Edição) -->
    <div class="panel" style="padding: 24px; border-radius: 16px; background: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
        <form onsubmit="saveProfileDetails(event)" style="display: flex; flex-direction: column; gap: 16px;">
            
            <!-- Avatar Upload/Visualizer -->
            <div style="text-align: center; position: relative;">
                <div id="profile-avatar-container" style="width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--primary) 0%, #10b981 100%); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto; font-size: 2.5rem; color: white; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25); overflow: hidden; position: relative; border: 3px solid white;">
                    <i class="fas fa-user" id="profile-avatar-placeholder"></i>
                    <img id="profile-avatar-img" style="width: 100%; height: 100%; object-fit: cover; display: none;" src="" alt="Foto de Perfil">
                </div>
                
                <!-- Upload button overlay -->
                <label for="profile-photo-upload" style="background: var(--primary); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; bottom: 12px; left: calc(50% + 18px); cursor: pointer; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
                    <i class="fas fa-camera" style="font-size: 0.85rem;"></i>
                    <input type="file" id="profile-photo-upload" accept="image/*" onchange="handleProfilePhotoChange(event)" style="display: none;">
                </label>
            </div>

            <div class="form-group">
                <label>Nome de Exibição *</label>
                <input type="text" id="profile-input-name" required placeholder="Seu nome completo" style="height: 42px;">
            </div>

            <div class="form-group">
                <label>Apelido / Usuário Informal</label>
                <input type="text" id="profile-input-apelido" placeholder="Ex: Vini" style="height: 42px;">
            </div>

            <div class="form-group">
                <label>Data de Nascimento</label>
                <input type="date" id="profile-input-nascimento" style="height: 42px;">
            </div>

            <div style="font-size: 0.8rem; display: flex; flex-direction: column; gap: 8px; background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: var(--text-muted);">Usuário (Login):</span>
                    <strong id="profile-info-username">-</strong>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: var(--text-muted);">Cargo / Função:</span>
                    <strong id="profile-info-role" style="color: var(--primary); font-weight: 700;">-</strong>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="padding: 14px; font-weight: 700; width: 100%; border-radius: 10px; background: var(--primary); border-color: var(--primary);">
                <i class="fas fa-save"></i> Salvar Alterações
            </button>
        </form>
    </div>
    
    <!-- Card Outros Perfis (Chefes / Admins) -->
    <div class="panel" id="panel-other-profiles" style="display: none; border-radius: 16px;">
        <div class="panel-header" style="padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-users-cog" style="color: var(--primary); font-size: 1.15rem;"></i>
                <h4 style="font-weight: 700; margin: 0;">Outros Perfis no Sistema</h4>
            </div>
            <button onclick="loadOtherProfilesRealTime()" class="btn-icon" title="Atualizar Lista" style="padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; background: white; border: 1px solid var(--border);">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
        <div class="table-container">
            <table class="table-pro">
                <thead>
                    <tr>
                        <th style="width: 60px;">Foto</th>
                        <th>Nome</th>
                        <th>Apelido</th>
                        <th>Data Nasc.</th>
                        <th style="text-align: center;">Acesso</th>
                        <th style="text-align: right;">Ações</th>
                    </tr>
                </thead>
                <tbody id="profile-list-users">
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 24px;">Carregando perfis...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function() {
        if (typeof loadProfilePage === 'function') {
            loadProfilePage();
        }
    })();
</script>
