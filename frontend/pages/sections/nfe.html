<header class="top-bar">
    <div>
        <h2 class="page-title">Gestão de Notas Fiscais</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Controle e emissão de documentos fiscais organizados por entidade.</p>
    </div>
    <div style="display: flex; gap: 12px; align-items: center;">
        <div class="search-box-pro" style="width: 400px;">
            <i class="fas fa-search"></i>
            <input type="text" id="nfe-search-input" placeholder="Buscar por fornecedor, produto ou chave..." onkeyup="filterNFeBySearch(this.value)">
        </div>
        <button class="btn-primary" onclick="abrirNFeAvulsa()" title="Emitir nota fiscal sem partir de uma venda já registrada">
            <i class="fas fa-file-circle-plus"></i> Nota Avulsa
        </button>
        <button class="btn-primary" onclick="loadNFeTable()" title="Atualizar lista">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>
</header>

<!-- RESUMO FISCAL -->
<div class="kpi-grid-pro nfe-kpi-grid">
    <div class="panel nfe-kpi-card">
        <div class="nfe-kpi-icon tint-green"><i class="fas fa-file-invoice-dollar"></i></div>
        <div>
            <p class="nfe-kpi-label">Total Emitido (Mês)</p>
            <h4 id="nfe-total-mes" class="nfe-kpi-value" style="color: var(--primary);">R$ 0,00</h4>
        </div>
    </div>
    <div class="panel nfe-kpi-card">
        <div class="nfe-kpi-icon tint-orange"><i class="fas fa-clock"></i></div>
        <div>
            <p class="nfe-kpi-label">Aguardando Emissão</p>
            <h4 id="nfe-pending-count" class="nfe-kpi-value" style="color: var(--accent);">0 Notas</h4>
        </div>
    </div>
    <div class="panel nfe-kpi-card">
        <div class="nfe-kpi-icon tint-blue"><i class="fas fa-layer-group"></i></div>
        <div>
            <p class="nfe-kpi-label">Total de Notas</p>
            <h4 id="nfe-total-count" class="nfe-kpi-value" style="color: #1e40af;">0 Notas</h4>
        </div>
    </div>
</div>

<!-- FILTROS E ORGANIZAÇÃO -->
<div class="panel">
    <div class="panel-header nfe-panel-header">
        <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
            <h4 style="font-weight: 800; display:flex; align-items:center; gap:8px;"><i class="fas fa-box-archive" style="color:var(--primary);"></i> Arquivo de Notas Fiscais</h4>
            <div class="filter-group-pro">
                <button onclick="setNFeGrouping('fornecedor')" class="filter-btn active" id="btn-group-forn"><i class="fas fa-user-tie"></i> Fornecedor</button>
                <button onclick="setNFeGrouping('data')" class="filter-btn" id="btn-group-data"><i class="fas fa-calendar"></i> Data</button>
                <button onclick="setNFeGrouping('status')" class="filter-btn" id="btn-group-status"><i class="fas fa-tag"></i> Status</button>
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <select id="nfe-month-filter" onchange="loadNFeTable()" class="minimal-select">
                <option value="all">Todos os Meses</option>
                <option value="current">Mês Atual</option>
                <option value="last">Mês Passado</option>
            </select>
        </div>
    </div>

    <!-- CONTAINER DINÂMICO DE NOTAS -->
    <div id="nfe-dynamic-container" style="padding: 20px;">
        <!-- Injetado via JS: Grupos de notas por fornecedor ou data -->
    </div>
</div>
