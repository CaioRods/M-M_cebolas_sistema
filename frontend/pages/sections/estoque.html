<header class="top-bar">
    <h2 class="page-title">Controle de Estoque</h2>
    <div style="display: flex; gap: 12px;">
        <button class="btn-primary" style="background: #059669;" onclick="showSection('entrada')">
            <i class="fas fa-plus"></i> Entrada
        </button>
        <button class="btn-primary" style="background: #dc2626;" onclick="showSection('saida')">
            <i class="fas fa-minus"></i> Saída
        </button>
    </div>
</header>

<!-- Resumo Geral -->
<div class="panel" style="background: linear-gradient(135deg, var(--primary-dark), #064e3b); color: white; padding: 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.15);">
    <div>
        <h3 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 5px;">Inventário Global</h3>
        <p style="opacity: 0.8; font-size: 0.85rem;">Status consolidado de todos os produtos em estoque</p>
    </div>
    <div style="display: flex; gap: 30px; text-align: right;">
        <div>
            <span style="font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.7;">Total de Caixas</span>
            <h4 id="total-global-cx" style="font-size: 1.8rem; font-weight: 900;">0</h4>
        </div>
        <div>
            <span style="font-size: 0.65rem; font-weight: 700; text-transform: uppercase; opacity: 0.7;">Peso Total (Kg)</span>
            <h4 id="total-global-kg" style="font-size: 1.8rem; font-weight: 900;">0</h4>
        </div>
    </div>
</div>

<!-- Resumo por produto -->
<div id="estoque-resumo" style="margin-bottom: 30px;">
    <!-- Injetado via JS -->
</div>

<div class="panel">
    <div class="panel-header">
        <h4 style="font-weight: 700;">Histórico de Movimentações</h4>
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="filter-tipo" onchange="filterTable()" style="padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 0.85rem;">
                <option value="">Todos os tipos</option>
                <option value="entrada">Compras</option>
                <option value="saida">Vendas</option>
                <option value="despesa">Despesas</option>
            </select>
            <div class="search-box" style="width: 260px;">
                <i class="fas fa-search"></i>
                <input type="text" id="search-mov" placeholder="Filtrar movimentação..." onkeyup="filterTable()">
            </div>
        </div>
    </div>
    <div class="table-container">
        <table class="table-compact" id="main-table">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Tipo</th>
                    <th>Produto</th>
                    <th>Descrição / Contato</th>
                    <th>Caixas</th>
                    <th>Kg</th>
                    <th>Valor</th>
                    <th style="text-align: right;">Ações</th>
                </tr>
            </thead>
            <tbody id="full-table-body">
                <!-- JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
    function filterTable() {
        const input = document.getElementById("search-mov");
        const tipoFilter = document.getElementById("filter-tipo").value.toUpperCase();
        const filter = input.value.toUpperCase();
        const table = document.getElementById("main-table");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            let found = false;
            const tds = tr[i].getElementsByTagName("td");
            let tipoMatch = true;

            if (tipoFilter) {
                const tipoCell = tds[1] ? tds[1].textContent.toUpperCase() : '';
                if (tipoFilter === 'ENTRADA') tipoMatch = tipoCell.includes('COMPRA');
                else if (tipoFilter === 'SAIDA') tipoMatch = tipoCell.includes('VENDA');
                else if (tipoFilter === 'DESPESA') tipoMatch = tipoCell.includes('DESPESA');
            }

            for (let j = 0; j < tds.length; j++) {
                if (tds[j].textContent.toUpperCase().indexOf(filter) > -1) {
                    found = true;
                    break;
                }
            }
            tr[i].style.display = (found && tipoMatch) ? "" : "none";
        }
    }
</script>
